<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" style="text-align: center; padding-top: 5rem;">
        <h1 class="title">Smart Parking System</h1>
        <p class="subtitle">Next-Generation AI Parking Management</p>

        <div class="landing-grid">
            <a href="user.html" class="glass-panel role-card">
                <i class="fa-solid fa-car role-icon" style="color: var(--accent-primary)"></i>
                <h2>Driver Portal</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem">Find a spot and make a reservation</p>
            </a>

            <a href="admin.html" class="glass-panel role-card">
                <i class="fa-solid fa-user-shield role-icon" style="color: var(--accent-secondary)"></i>
                <h2>Admin Portal</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem">Monitor occupancy and manage bookings</p>
            </a>
        </div>
    </div>
</body>
</html>
